name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Remote Control
      run: ./gradlew assembleDebug --stacktrace --no-daemon
      working-directory: .

    - name: Build Bandwidth Eater
      run: |
        cd ../BandwidthEaterApp
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace --no-daemon

    - name: Upload Remote Control APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartIRRemote-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Bandwidth Eater APK
      uses: actions/upload-artifact@v4
      with:
        name: BandwidthEater-debug
        path: ../BandwidthEaterApp/app/build/outputs/apk/debug/*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          app/build/outputs/apk/debug/*.apk
          ../BandwidthEaterApp/app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
