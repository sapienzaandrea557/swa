name: Bandwidth Eater Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Fix line endings and permissions for gradlew
      run: |
        cd BandwidthEaterApp
        tr -d '\r' < gradlew > gradlew.new
        mv gradlew.new gradlew
        chmod +x gradlew

    - name: Build Bandwidth Eater APK
      run: |
        cd BandwidthEaterApp
        ./gradlew assembleDebug --stacktrace --no-daemon -x lint
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

    - name: Upload Bandwidth Eater APK
      uses: actions/upload-artifact@v4
      with:
        name: BandwidthEater-GOD-MODE
        path: BandwidthEaterApp/app/build/outputs/apk/debug/*.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: BandwidthEaterApp/app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
